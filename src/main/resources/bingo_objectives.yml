# TriBingo — Default Bingo Objectives
#
# This file defines all objectives that can appear on the Bingo board.
# Edit freely: add, remove, or adjust objectives to fit your server.
# The file will NOT be overwritten on plugin restart.
#
# ── Fields ──────────────────────────────────────────────────────────────────
#
#   id          Unique identifier. Must match persistence keys — do not change
#               after a game has been persisted.
#
#   type        Determines the event that triggers completion. Supported types:
#                 kill_entity, mine_block, place_block, craft_item, fish_item,
#                 eat_food, enchant_item, travel_distance, breed_mob, tame_entity
#
#   difficulty  EASY | MEDIUM | HARD | INSANE  (display only for now)
#
#   name        MiniMessage string shown in the GUI and announcements.
#   description MiniMessage string shown when a player clicks the cell.
#
#   Additional parameters depend on the type (see each section below).
#
# ── MiniMessage reference ────────────────────────────────────────────────────
#   <red>, <green>, <gold>, <aqua>, <gray>, <white>, <bold>, <i>, etc.
#   Full docs: https://docs.advntr.dev/minimessage/format.html
# ─────────────────────────────────────────────────────────────────────────────

